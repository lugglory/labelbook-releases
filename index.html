<!doctype html>
<!-- Labelbook release page: v0.1.0 -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labelbook 다운로드</title>
    <style>
      :root {
        --bg: #f7f7f4;
        --panel: #ffffff;
        --text: #202124;
        --muted: #636a6d;
        --line: #dadce0;
        --brand: #1f6f68;
        --label: #ffd85a;
        --label-border: #2f4f4a;
        --shadow: 0 18px 60px rgba(32, 33, 36, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 18px;
      }

      .download {
        width: min(720px, 100%);
        padding: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
      }

      .brand svg {
        width: 48px;
        height: 48px;
        flex: 0 0 auto;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 6vw, 48px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .summary {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      .download-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 58px;
        padding: 14px 18px;
        border: 1px solid var(--brand);
        border-radius: 7px;
        background: var(--brand);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }

      .download-button.secondary {
        background: #fff;
        color: var(--brand);
      }

      .download-button small {
        color: inherit;
        font-size: 13px;
        font-weight: 500;
        opacity: 0.8;
      }

      .notes {
        margin: 24px 0 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.65;
      }

      @media (max-width: 560px) {
        .download {
          padding: 24px;
        }

        .download-button {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="download" aria-labelledby="title">
        <div class="brand">
          <svg viewBox="0 0 36 36" aria-hidden="true">
            <rect x="3" y="3" width="30" height="30" rx="8" fill="#1f6f68" />
            <path d="M8.5 10.5c3.8-.6 6.6.1 9.5 2.1 2.9-2 5.7-2.7 9.5-2.1v15.7c-3.7-.6-6.7.1-9.5 2-2.8-1.9-5.8-2.6-9.5-2z" fill="#fff8df" />
            <path d="M18 12.6v15.6" fill="none" stroke="#d8c87b" stroke-width="1.5" stroke-linecap="round" />
            <path d="M11.5 15.1c1.8-.1 3.2.2 4.6 1M11.5 18.5c1.8-.1 3.2.2 4.6 1" fill="none" stroke="#d8c87b" stroke-width="1.2" stroke-linecap="round" />
            <path d="M20.3 16.1 24 12.4h4v4l-3.7 3.7-4-4Z" fill="#ffd85a" stroke="#2f4f4a" stroke-width="1.4" stroke-linejoin="round" />
            <circle cx="24" cy="15.9" r="0.9" fill="#1f6f68" />
          </svg>
          <h1 id="title">Labelbook</h1>
        </div>

        <p class="summary">
          라벨 분류 방식 메모 앱입니다.
        </p>

        <div class="actions">
          <a class="download-button" href="https://github.com/lugglory/labelbook-releases/releases/download/v0.1.0/Labelbook_0.1.0_x64-setup.exe" download>
            <span>Windows 설치파일 다운로드</span>
            <small>권장 · EXE · v0.1.0</small>
          </a>
          <a class="download-button secondary" href="https://github.com/lugglory/labelbook-releases/releases/download/v0.1.0/Labelbook_0.1.0_x64_en-US.msi" download>
            <span>MSI 패키지 다운로드</span>
            <small>대체 설치파일 · v0.1.0</small>
          </a>
        </div>

        <ul class="notes">
          <li>Windows 10/11 64-bit 환경을 기준으로 빌드되었습니다.</li>
          <li>Google Drive를 연결하면 앱 전용 저장공간에 데이터가 동기화됩니다.</li>
          <li>서명되지 않은 빌드라 Windows SmartScreen 경고가 표시될 수 있습니다.</li>
        </ul>
      </section>
    </main>
  </body>
</html>
